server:
  port: 8080

spring:
  application:
    name: chatroom-server

  # Redis enabled via Docker (docker.m.daocloud.io/library/redis:7-alpine)
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 100
          max-idle: 50
          min-idle: 10

  # MySQL database (production / stress testing)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/chatroom?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:123456}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 600000

  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema.sql

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: Y2hhdHJvb20tc2VjcmV0LWtleS1mb3Itand0LXRva2VuLWdlbmVyYXRpb24tMjAyNA==
  expiration: 604800000  # 7 days in milliseconds

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.chatroom: debug

# Bot configuration
# Set API key via environment variable: export BOT_API_KEY=sk-your-key
# Or paste directly below (not recommended for production)
bot:
  default-api-key: ${BOT_API_KEY:}
  default-api-endpoint: ${BOT_API_ENDPOINT:https://api.deepseek.com/v1/chat/completions}
  default-model: ${BOT_API_MODEL:deepseek-chat}
  queue:
    max-size: 200
    poll-timeout-ms: 3000
  memory:
    cache-ttl-minutes: 60
    work-ttl-minutes: 30

qqce:
  access-token: ${QQCE_ACCESS_TOKEN:}

github:
  token: ${GITHUB_TOKEN:}
